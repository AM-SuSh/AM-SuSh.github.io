<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- 纸色底 -->
  <rect width="100" height="100" fill="#f6f3ec"/>
  <!-- 细印边框，像藏书印 -->
  <rect x="6" y="6" width="88" height="88" fill="none" stroke="#9a3b2c" stroke-width="2"/>
  <!-- AM 字样，衬线感 -->
  <text x="50" y="66" font-family="Georgia, 'Times New Roman', serif"
        font-size="48" font-weight="700" fill="#9a3b2c"
        text-anchor="middle" letter-spacing="-2">AM</text>
  <!-- 印章式小点 -->
  <circle cx="50" cy="80" r="2" fill="#9a3b2c"/>
</svg>
