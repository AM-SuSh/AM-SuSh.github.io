# =========================================================================
# 课程笔记站自动重建
# 触发：当 notes-src/、mkdocs.yml、requirements-notes.txt 有改动并 push 到 main
# 行为：重建 notes/ 并提交回 main —— 只动 notes/，绝不触碰根目录主页
# =========================================================================
name: Rebuild Notes Site

on:
  push:
    branches: [main]
    paths:
      - 'notes-src/**'
      - 'mkdocs.yml'
      - 'requirements-notes.txt'
      - '.github/workflows/notes.yml'
  # 允许手动触发
  workflow_dispatch:

permissions:
  contents: write    # 需要写权限以提交重建后的 notes/

concurrency:
  group: notes-rebuild
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0      # 完整历史，便于干净提交

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements-notes.txt') }}

      - name: Install dependencies
        run: pip install -r requirements-notes.txt

      - name: Build notes site
        run: mkdocs build --strict   # --strict：有任何警告即失败，保证质量

      - name: Commit rebuilt notes/
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add notes/
          if git diff --cached --quiet; then
            echo "notes/ 无变化，跳过提交"
          else
            git commit -m "notes: 重建笔记站 [skip ci]
            自动生成于 GitHub Actions"
            git push
          fi
